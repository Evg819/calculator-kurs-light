<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор от родолога Евгении Абдуллиной</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #fdf8f3 0%, #f3e7d9 40%, #e8d9c5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { background: #ffffff; border-radius: 28px; box-shadow: 0 24px 60px rgba(70,40,15,0.12); max-width: 680px; width: 100%; padding: 44px 32px 36px; }
        .container h1 { text-align: center; color: #4a3728; font-size: 26px; margin-bottom: 6px; font-weight: 700; }
        .container .subtitle { text-align: center; color: #9b8465; font-size: 14px; margin-bottom: 34px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 500; color: #5c4433; margin-bottom: 6px; font-size: 14px; }
        input, select { width: 100%; padding: 13px 16px; border: 2px solid #e0d5c7; border-radius: 13px; font-size: 15px; background: #fdfaf7; transition: all 0.3s; outline: none; color: #2c1f14; font-family: inherit; }
        input:focus, select:focus { border-color: #b8956a; box-shadow: 0 0 0 4px rgba(184,149,106,0.1); }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg,#c19a6b,#9b7350); color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: all 0.3s; }
        button:hover { background: linear-gradient(135deg,#d0ab7e,#a9805d); transform: translateY(-1px); }
        .error { background: #fef0f0; color: #8b3a3a; padding: 14px; border-radius: 12px; text-align: center; margin-top: 18px; border: 1px solid #f4c6c6; display: none; font-size: 14px; }
        .error.visible { display: block; }
        .result { display: none; margin-top: 26px; }
        .result.visible { display: block; }
        .section { margin-bottom: 24px; background: #fdfaf7; border-radius: 16px; padding: 20px 22px; border: 1px solid #e8ddd0; }
        .section h3 { color: #5c4433; font-size: 17px; margin-bottom: 14px; font-weight: 600; }
        .card { padding: 14px 16px; border-radius: 12px; margin-bottom: 10px; font-size: 14px; transition: all 0.3s; }
        .card.active { background: #fbf7f2; border: 1px solid #d4c4ae; cursor: pointer; }
        .card.inactive { background: #f9f7f5; border: 1px solid #ece6dd; color: #a89984; }
        .card .card-header { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px; }
        .card .card-desc { font-size: 13px; line-height: 1.5; color: #5c5040; display: none; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #e0d5c7; }
        .card.active.open .card-desc { display: block; }
        .card .toggle-icon { margin-left: auto; font-size: 12px; color: #b8956a; transition: transform 0.3s; }
        .card.active.open .toggle-icon { transform: rotate(180deg); }
        .heritage-block { margin-bottom: 8px; border-radius: 12px; background: #fbf7f2; border: 1px solid #e0d5c7; cursor: pointer; transition: all 0.3s; }
        .heritage-block .heritage-header { padding: 14px 16px; display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 15px; color: #4a3728; }
        .heritage-block .heritage-header .count { background: #e8ddd0; border-radius: 20px; padding: 3px 10px; font-size: 13px; color: #5c4433; margin-left: auto; }
        .heritage-block .heritage-desc { display: none; padding: 0 16px 14px; font-size: 13px; line-height: 1.6; color: #5c5040; }
        .heritage-block.open .heritage-desc { display: block; }
        .heritage-block .heritage-toggle { font-size: 12px; color: #b8956a; transition: transform 0.3s; }
        .heritage-block.open .heritage-toggle { transform: rotate(180deg); }
        .no-roles { font-size: 13px; color: #6b5744; margin-top: 8px; text-align: center; }
        .date-subtitle { font-size: 12px; color: #9b8465; margin-top: 2px; }
        .triangle-visual { display: flex; justify-content: center; gap: 30px; margin: 16px 0; font-size: 30px; font-weight: 700; color: #4a3728; }
        .triangle-visual .tri-item { text-align: center; }
        .triangle-visual .tri-item span { display: block; font-size: 12px; font-weight: 400; color: #8b6f4e; margin-top: 4px; }
        .triangle-total { text-align: center; font-size: 16px; font-weight: 700; color: #4a3728; margin: 8px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Калькулятор от родолога<br>Евгении Абдуллиной</h1>
        <p class="subtitle">автора курса «Сила рода»</p>

        <div class="form-group"><label>Моя дата рождения</label><input type="text" id="selfDate" placeholder="ДД.ММ.ГГГГ, например: 28.12.1987"></div>
        <div class="form-group"><label>Дата рождения мамы</label><input type="text" id="motherDate" placeholder="ДД.ММ.ГГГГ"><p class="date-subtitle">Нужно для расчёта задач рода и ключа</p></div>
        <div class="form-group"><label>Дата рождения папы</label><input type="text" id="fatherDate" placeholder="ДД.ММ.ГГГГ"><p class="date-subtitle">Нужно для расчёта задач рода и ключа</p></div>
        <div class="form-group"><label>Пол</label><select id="gender"><option value="">Выберите пол</option><option value="female">Женский</option><option value="male">Мужской</option></select></div>

        <button onclick="calculate()">Рассчитать</button>
        <div id="error" class="error"></div>
        <div id="result" class="result"></div>
    </div>

    <script>
        function parseDate(str) {
            if (!str || !str.trim()) return null;
            const parts = str.trim().split('.');
            if (parts.length !== 3) return null;
            const d = parseInt(parts[0]), m = parseInt(parts[1]), y = parseInt(parts[2]);
            if (isNaN(d)||isNaN(m)||isNaN(y)||d<1||d>31||m<1||m>12||y<1900||y>2099) return null;
            if (d > new Date(y, m, 0).getDate()) return null;
            return { day: d, month: m, year: y };
        }

        function sumDigits(num) {
            let s = 0; for (let ch of num.toString()) s += parseInt(ch); return s;
        }

        function destinyNumber(date) {
            if (!date) return null;
            const allDigits = [];
            (date.day>=10?[Math.floor(date.day/10),date.day%10]:[date.day]).forEach(v=>allDigits.push(v));
            (date.month>=10?[Math.floor(date.month/10),date.month%10]:[date.month]).forEach(v=>allDigits.push(v));
            for (let ch of date.year.toString()) { const d=parseInt(ch); allDigits.push(d); }
            const sum = allDigits.reduce((a,b)=>a+b,0);
            let result = sum;
            while (result > 9) {
                result = result.toString().split('').reduce((a,b)=>a+parseInt(b),0);
            }
            return result;
        }

        function birthNumber(day) {
            if (day >= 1 && day <= 22) return day;
            return Math.floor(day/10) + (day%10);
        }

        function calcFourNumbers(day, month, year) {
            const allDigitsNoZero = [];
            (day>=10?[Math.floor(day/10),day%10]:[day]).forEach(v=>allDigitsNoZero.push(v));
            (month>=10?[Math.floor(month/10),month%10]:[month]).forEach(v=>allDigitsNoZero.push(v));
            for(let ch of year.toString()){ const d=parseInt(ch); if(d!==0) allDigitsNoZero.push(d); }
            const r1 = allDigitsNoZero.reduce((a,b)=>a+b,0);
            const r2 = r1.toString().split('').reduce((a,b)=>a+parseInt(b),0);
            const r3 = year<2000 ? r1 - 2*(day<10?day:Math.floor(day/10)) : r1+19;
            const sum4 = r3.toString().split('').reduce((a,b)=>a+parseInt(b),0);
            const r4 = sum4===10?1: (sum4===11||sum4===12?sum4:sum4);
            return { r1, r2, r3, r4, allDigitsNoZero };
        }

        function getCommonSet(allDigits, r1, r2, r3, r4) {
            const set = [...allDigits];
            [r1,r2,r3,r4].forEach(v=>{ for(let ch of v.toString()) set.push(parseInt(ch)); });
            return set;
        }

        function spiritualTask(personMonth, parentMonth) {
            if (!personMonth || !parentMonth) return null;
            let v = personMonth + parentMonth; if (v > 22) v -= 22; return v;
        }

        function materialTask(personDay, parentDay) {
            if (!personDay || !parentDay) return null;
            let pn = birthNumber(personDay), rn = birthNumber(parentDay), v = pn + rn;
            if (v > 22) v -= 22; return v;
        }

        function keyTask(selfDestiny, motherDestiny, fatherDestiny) {
            if (!selfDestiny || !motherDestiny || !fatherDestiny) return null;
            let v = selfDestiny + motherDestiny + fatherDestiny; if (v > 22) v -= 22; return v;
        }

        // ========== СОКРАЩЁННЫЕ ОПИСАНИЯ ДЛЯ ДУХОВНЫХ ЗАДАЧ ==========
        function spiritualDesc(num) {
            const desc = {
                1: 'В Роду нарушена идея ценности человека как личности. Потомок не чувствует своей значимости, боится проявляться, стесняется своих желаний, не умеет говорить о своих потребностях.',
                2: 'В Роду нарушена способность хранить тайны и уважать границы. Потомку передаётся привычка разбалтывать задуманное, а также чувство вины перед матерью или проблемы в отношениях с ней.',
                3: 'В Роду нарушен баланс между материальным и духовным. Потомок либо стыдится богатства, либо одержим деньгами, либо боится потерь и не позволяет себе радоваться жизни.',
                4: 'В Роду нарушено уважение к мужчинам и здоровый баланс власти. Потомок либо тянет всё на себе, либо не может выстроить уважительные отношения с мужчинами.',
                5: 'В Роду нарушены традиции, связь между поколениями и законы морали. Потомок мечется между старым и новым, не зная, где его место.',
                6: 'В Роду не было счастья в любви, нарушена передача любви от родителей к детям. Потомок не чувствует себя достойным любви и денег, или деньги утекают на разрушительные вещи.',
                7: 'В Роду живёт установка «счастья нет». Потомок боится перемен, зависает в некомфортных ситуациях, не верит в удачу и не может решиться на изменения.',
                8: 'В Роду нарушен закон — земной или небесный. Есть кармические долги, которые нужно вернуть через честность, справедливость и принятие потерь.',
                9: 'В Роду потеряны корни и связь с местом. Потомок чувствует себя неприкаянным, часто меняет место жительства или профессию, ищет себя.',
                10: 'В Роду сильна рука Судьбы. Потомок проходит через поворотные события, взлёты и падения, которые делят жизнь на «до» и «после». Важно не цепляться за периоды изобилия и не падать духом в кризисы.',
                11: 'В Роду мало энергии, предки истощили родовой ресурс. Потомку предстоит нарабатывать силу самостоятельно через преодоление трудностей и контроль зависимостей.',
                12: 'В Роду был серьёзный кризис, и Род мог прерваться. Потомок чувствует страхи, зависает в бесперспективных ситуациях, но имеет сильные способности в эзотерике.',
                13: 'Род зашёл в тупик, старые сценарии не работают. Потомок — начало новой ветки, его задача — выйти из родовых сценариев, жить по-новому и не бояться перемен.',
                14: 'В Роду не умели обращаться с эмоциями и жили в ограничениях. Потомок боится многого, подстраивается под других, но важно учиться балансу и не впадать в крайности.',
                15: 'В Роду сильны страсти, соблазны, но магический дар утрачен. Потомку важно контролировать свою тёмную сторону, не идти на поводу у зависимостей и не использовать чёрную магию.',
                16: 'В Роду разрушительная, динамичная энергия. Потомок сталкивается с внезапными кризисами, его гордыня разрушается, важно быть гибким и не вкладывать всё в один проект.',
                17: 'В Роду сильна удача, есть ощущение счастливой Судьбы. Потомок удачлив в финансах, но важно не терять веру и не давать страхам отогнать удачу.',
                18: 'В Роду сильная связь, но сложная: женские слёзы, аборты, потеря детей. Потомок слишком эмпатичен, сложные отношения с мамой и чувство, что «кого-то не хватает».',
                19: 'В Роду были яркие, успешные предки. Потомок стремится к роскоши и успеху, но высокие ожидания родителей становятся бременем, важно проработать гордыню.',
                20: 'В Роду пришло время платить по кармическим счетам. Самые важные события происходят через семью, важно не разрывать связи и пройти этап испытаний.',
                21: 'Род достиг своего пика. Потомку нужно расширять границы, иначе Род начнёт ухудшаться. Важно переезжать, пробовать новое, брать ответственность.',
                22: 'Род завершает эволюционный этап. Потомок — начало новой ветки, его задача — начать с нуля, не бояться потерь, создать что-то новое и передать детям лучшее.'
            };
            return desc[num] || desc[1];
        }

        // ========== СОКРАЩЁННЫЕ ОПИСАНИЯ ДЛЯ МАТЕРИАЛЬНЫХ ЗАДАЧ ==========
        function materialDesc(num) {
            const desc = {
                1: 'В Роду нарушен здоровый энергообмен и отношения с деньгами. Потомку важно найти правильное место для своих сил и реализовываться через свои способности.',
                2: 'В Роду нарушено отношение к деньгам и честности в отношениях. Важно выйти из страхов, тайн и недоверия, научиться честно обращаться с деньгами.',
                3: 'В Роду нарушено отношение к телу, деньгам и детям. Важно восстановить здоровое отношение к своей внешности, деньгам и воспитанию детей.',
                4: 'В Роду нарушен баланс мужских и женских энергий. Важно восстановить уважение к мужчинам и не брать чужое, но и не отказываться от своего.',
                5: 'В Роду нарушены традиции и связь между поколениями. Важно сохранить уважение к традициям и укрепить связь между поколениями.',
                6: 'В Роду нарушена передача любви, что влияет на деньги и отношения с детьми. Важно восстановить передачу любви и научиться выбирать то, что действительно любишь.',
                7: 'В Роду трудно контролировать свою жизнь и деньги. Важно восстановить движение, перестать зависать в некомфорте и научиться идти к своим целям.',
                8: 'В Роду есть кармические долги. Важно закрывать их через добросовестность, справедливость и соблюдение правил.',
                9: 'В Роду человек вынужден начинать с нуля. Важно развивать мудрость и духовность, а также найти родственную душу.',
                10: 'В Роду ярко чередуются взлёты и падения. Важно выйти из страха перед нестабильностью и сохранять внутреннее равновесие.',
                11: 'Чем больше желаний — тем больше ресурсов. Важно развивать силу воли и контролировать зависимости.',
                12: 'Человек склонен к иллюзорным целям и зависает в бесперспективных ситуациях. Важно выйти из подвешенности и научиться сохранять свои ресурсы.',
                13: 'Человек несёт энергию трансформаций. Важно не бояться перемен, вовремя завершать отжившее и строить новую реальность.',
                14: 'Человек с детства сталкивается с ограничениями. Важно выйти из ограничений, перестать жить по чужим правилам и научиться сохранять баланс.',
                15: 'Множество материальных желаний и соблазнов. Важно признать свои желания, выбрать честный заработок и не усиливать родовую программу через соблазны.',
                16: 'Планы нарушаются, случаются резкие перемены. Важно создавать «подушку безопасности», контролировать гордыню и расти не ради показухи.',
                17: 'Человек удачлив в финансах. Важно раскрыть свой талант, не предавать себя и использовать свою уникальность для создания благополучия.',
                18: 'Человек приспосабливается к обстоятельствам и сильно связан с родителями. Важно выйти из эмоционального тумана и пройти взрослое отделение от родителей.',
                19: 'Человек стремится к роскоши и успеху. Важно проработать гордыню и использовать деньги и силу во благо не только себе, но и другим.',
                20: 'Через борьбу приходит счастье. Важно принять свой род, укрепить связь между родными и создать семейные традиции.',
                21: 'Внутреннее состояние влияет на деньги. Важно закрывать незаконченные дела, иметь свой дом и соединить внутреннюю целостность с внешним успехом.',
                22: 'Человеку приходится начинать с нуля. Важно выйти из безответственности, научиться начинать заново и ставить чёткие цели.'
            };
            return desc[num] || '';
        }

        // ========== СОКРАЩЁННЫЕ ОПИСАНИЯ ДЛЯ КЛЮЧЕЙ ==========
        function keyDesc(num) {
            const desc = {
                1: 'Слова — это энергия. Наладить контакт с родственниками, развивать самооценку и учиться говорить ярко.',
                2: 'Избегать тайных отношений, проявлять заботу о семье, чтить род и пройти сепарацию от детей.',
                3: 'Принятие себя и своей внешности. Создавать красоту, уют и материальное благополучие.',
                4: 'Женщинам — принимать мужчину. Мужчинам — нарабатывать мужественность и ответственность.',
                5: 'Чтить традиции рода, узнавать о предках, получить и дать благословение, беречь честь.',
                6: 'Научиться любить себя, обеспечивать комфорт и делать то, что хочется, а не только что нужно.',
                7: 'Развивать скорость, заниматься спортом, путешествовать, чувствовать себя счастливым и не зависать.',

                9: 'Молиться за род, развиваться в психологии или эзотерике, передавать мудрость.',
                10: 'Чувствовать себя счастливым, не давать зароков и разумно распоряжаться деньгами.',
                11: 'Развиваться через борьбу, не гордиться и управлять людьми во благо.',
                12: 'Находиться в реальности, иметь чёткий план, заземляться и избегать роли жертвы.',
                13: 'Не зависать, ставить точку, уходить от старого и менять негативные сценарии.',
                14: 'Избегать крайностей, иметь планы, не залипать и снимать родовые зароки.',
                15: 'Управлять людьми во благо, контролировать страсти и зарабатывать честно.',
                16: 'Контролировать цели, не гордиться и признавать неверные выборы.',
                17: 'Верить в судьбу, раскрыть таланты, делиться опытом и уметь прощать.',
                18: 'Выстраивать отношения с женщинами, мыслить позитивно и иметь дом, очаг.',
                19: 'Не использовать возможности только для себя, заботиться о близких и доводить дела до конца.',
                20: 'Не делать неверный выбор, ставить долг выше страстей и создать наследие.',
                21: 'Доводить до конца, иметь цели и действовать ради улучшения мира.',
                22: 'Избавляться от стереотипов, передать детям лучшее, жить смело и пробовать новое.'
            };
            return desc[num] || '';
        }

                <div class="card-desc">
                    <p>${isHealer?'Проявлена фигура Целителя рода.':'Не проявлено.'}</p>
                    <p style="margin-top:8px;">Целитель рода — человек, через которого в семью приходит покой. Рядом с ним людям становится легче даже без слов.</p>
                </div>
            </div>`;
            if(!isCrisis&&!isKeeper&&!isHealer) h+=`<p class="no-roles">Ключевые родовые фигуры не проявлены.</p>`;

            h+=`</div>`;

            // ===== 3. РОДОВОЕ НАСЛЕДИЕ =====
            h+=`<div class="section"><h3>🌳 Родовое наследие</h3>`;
            h+=hb(2,c2,'Энергия жизни',d2(c2));
            h+=hb(4,c4,'Энергия здоровья',d4(c4));
            h+=hb(5,c5,'Энергия семьи',d5(c5,gender,has5,has8));
            h+=hb(7,c7,'Энергия защиты',d7(c7));
            h+=hb(8,c8,'Энергия рода, энергия эгрегора',d8(c8,gender,has5,has8));
            h+=`</div>`;

            // ===== 4. ДУХОВНЫЕ ЗАДАЧИ РОДА =====
            if (spiritFather || spiritMother) {
                h+=`<div class="section"><h3>🕊️ Духовные задачи рода</h3>`;
                if (spiritFather) h+=`<div class="card active" onclick="toggleCard(this)"><div class="card-header"><span>🧬 По линии отца — ${spiritFather} энергия</span><span class="toggle-icon">▼</span></div><div class="card-desc"><p>${spiritualDesc(spiritFather)}</p></div></div>`;
                if (spiritMother) h+=`<div class="card active" onclick="toggleCard(this)"><div class="card-header"><span>🧬 По линии матери — ${spiritMother} энергия</span><span class="toggle-icon">▼</span></div><div class="card-desc"><p>${spiritualDesc(spiritMother)}</p></div></div>`;
                h+=`</div>`;
            }

            // ===== 5. МАТЕРИАЛЬНЫЕ ЗАДАЧИ РОДА =====
            if (materialFather || materialMother) {
                h+=`<div class="section"><h3>💰 Материальные задачи рода</h3>`;
                if (materialFather) h+=`<div class="card active" onclick="toggleCard(this)"><div class="card-header"><span>🧬 По линии отца — ${materialFather} энергия</span><span class="toggle-icon">▼</span></div><div class="card-desc"><p>${materialDesc(materialFather)}</p></div></div>`;
                if (materialMother) h+=`<div class="card active" onclick="toggleCard(this)"><div class="card-header"><span>🧬 По линии матери — ${materialMother} энергия</span><span class="toggle-icon">▼</span></div><div class="card-desc"><p>${materialDesc(materialMother)}</p></div></div>`;
                h+=`</div>`;
            }

            // ===== 6. КЛЮЧ К РЕАЛИЗАЦИИ ЗАДАЧ РОДА =====
            if (key) {
                h+=`<div class="section"><h3>🗝️ Ключ к реализации задач рода</h3>`;
                h+=`<div class="card active" onclick="toggleCard(this)"><div class="card-header"><span>🔑 Ключ — ${key} энергия</span><span class="toggle-icon">▼</span></div><div class="card-desc"><p>${keyDesc(key)}</p></div></div>`;
                h+=`</div>`;
            }

            // ===== 7. ФИНАНСОВЫЙ РОДОВОЙ КАНАЛ =====
            h+=`<div class="section"><h3>💎 Финансовый родовой канал</h3>`;
            h+=`<div class="triangle-visual"><div class="tri-item">${fc4}<span>4 — здоровье</span></div><div class="tri-item">${fc5}<span>5 — удержание</span></div><div class="tri-item">${fc6}<span>6 — капитал</span></div></div>`;
            h+=`<div class="triangle-total">Всего цифр: ${fcFinance} — ${fcLevel}</div>`;
            h+=`<div class="card active" onclick="toggleCard(this)"><div class="card-header"><span>📊 Уровень финансового канала</span><span class="toggle-icon">▼</span></div><div class="card-desc"><p>${fcLevelDesc}</p></div></div>`;
            h+=`<div class="card active" onclick="toggleCard(this)"><div class="card-header"><span>🔹 4 — Энергия здоровья (${fc4})</span><span class="toggle-icon">▼</span></div><div class="card-desc"><p>${financeDesc456(4, fc4)}</p></div></div>`;
            h+=`<div class="card active" onclick="toggleCard(this)"><div class="card-header"><span>🔹 5 — Энергия удержания (${fc5})</span><span class="toggle-icon">▼</span></div><div class="card-desc"><p>${financeDesc456(5, fc5)}</p></div></div>`;
            h+=`<div class="card active" onclick="toggleCard(this)"><div class="card-header"><span>🔹 6 — Энергия капитала (${fc6})</span><span class="toggle-icon">▼</span></div><div class="card-desc"><p>${financeDesc456(6, fc6)}</p></div></div>`;
            h+=`</div>`;

            // ===== 8. ВЛИЯНИЕ ПРОШЛОГО ВОПЛОЩЕНИЯ =====
            const pos1 = pastLifePosition1(selfDate.day);
            const pos2 = selfDate.month;
            const pos3 = pastLifePosition3(selfDate.year);
            const whoWas = pastLifeWhoWas(pos1, pos2);
            const whatDid = pastLifeWhatDid(pos2, pos3);
            const lesson = pastLifeLesson(selfDate.month);

            h += `<div class="section"><h3>🌀 Влияние прошлого воплощения</h3>`;
            h += `<div class="card active" onclick="toggleCard(this)"><div class="card-header"><span>👤 Кем был — ${whoWas} энергия</span><span class="toggle-icon">▼</span></div><div class="card-desc"><p>${pastLifeWhoDesc[whoWas] || ''}</p></div></div>`;
            h += `<div class="card active" onclick="toggleCard(this)"><div class="card-header"><span>⚡ Что делал — ${whatDid} энергия</span><span class="toggle-icon">▼</span></div><div class="card-desc"><p>${pastLifeWhatDesc[whatDid] || ''}</p></div></div>`;
            h += `<div class="card active" onclick="toggleCard(this)"><div class="card-header"><span>📖 Непройденный урок — ${lesson} месяц</span><span class="toggle-icon">▼</span></div><div class="card-desc"><p>${pastLifeLessonDesc[lesson] || ''}</p></div></div>`;
            h += `</div>`;

            // ===== 9. ПРЕДНАЗНАЧЕНИЕ ДУШИ =====
            if (soulDestiny) {
                h += `<div class="section"><h3>✨ Предназначение души</h3>`;
                h += `<div class="card active" onclick="toggleCard(this)"><div class="card-header"><span>🎯 Число судьбы — ${soulDestiny}</span><span class="toggle-icon">▼</span></div><div class="card-desc"><p>${destinyDesc[soulDestiny] || ''}</p></div></div>`;
                h += `</div>`;
            }

            resultDiv.innerHTML = h;
            resultDiv.classList.add('visible');
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function hb(num,cnt,name,desc){ return `<div class="heritage-block" onclick="toggleHeritage(this)"><div class="heritage-header"><span>🔹 ${num} — ${name}</span><span class="count">${cnt}</span><span class="heritage-toggle">▼</span></div><div class="heritage-desc">${desc}</div></div>`; }
        function toggleCard(el){ if(el.classList.contains('active')) el.classList.toggle('open'); }
        function toggleHeritage(el){ el.classList.toggle('open'); }
        function d2(c){ return c===0?'Род не смог дать большой энергетический запас.':c===1?'Одна 2 — энергетически самодостаточен.':c===2?'Две 2 — энергетический донор для близких.':c===3?'Три 2 — сильный поток энергии, интуиция.':'Четыре 2 и более — сильный энергетический донор.'; }
        function d4(c){ return c===0?'Энергии здоровья передано мало.':c===1?'Одна 4 — потенциал на продолжение рода.':'Две 4 и более — сильная энергия здоровья.'; }
        function d5(c,g,h5,h8){ if(c===0){ let b='Слабое место в энергии семьи. '; if(g==='female'&&!h5) b+='Показатель кризис менеджера рода. '; return b; } return c===1?'Одна 5 — баланс мужской и женской энергии.':c===2?'Две 5 — задача продолжить семью.':c===3?'Три 5 — серьёзный родовой сбой.':'Энергия семьи выражена очень сильно.'; }
        function d7(c){ return c===0?'После 26 лет важно нарабатывать защиту.':c===1?'Одна 7 — есть ангел хранитель.':c===2?'Две 7 — есть хранитель из рода.':c===3?'Три 7 — человек-талисман.':'Энергия защиты выражена очень сильно.'; }
        function d8(c,g,h5,h8){ if(c===0){ let b='Слабое место в энергии рода. '; if(g==='female'&&!h8) b+='Показатель кризис менеджера рода. '; return b; } return c===1?'Одна 8 — семья в приоритете.':c===2?'Две 8 — служение семье и социуму.':c===3?'Три 8 — великий дар от рода.':'Энергия рода выражена очень сильно.'; }
    </script>
</body>
</html>
